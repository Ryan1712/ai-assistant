version: 2
updates:
  # Keep GitHub Actions up to date.
  # appleboy/ssh-action and appleboy/scp-action are SHA-pinned in deploy.yml
  # because they receive the SSH private key — Dependabot still opens PRs to
  # update those SHAs when a new tagged version is released, so the pin stays
  # current without manual tracking.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # Bundle ALL action updates into a single PR (one PR, one CI run) instead of
    # one PR per action.
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
